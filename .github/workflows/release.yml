name: Release (PyPI)

# Manual trigger only. PyPI publication requires a Trusted-Publisher entry on
# PyPI bound to this repo + the `pypi` environment. Until that is configured,
# running this workflow will fail at the publish step. Set up Trusted Publisher
# at https://pypi.org/manage/account/publishing/ then re-run via the Actions tab.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or ref to build from (e.g. v0.1.0)"
        required: true
        default: ""

permissions:
  contents: read
  id-token: write  # required for PyPI trusted publishing (OIDC)

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/cvar-leximin-fair/
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheels + sdist
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build
      - name: Publish to PyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
