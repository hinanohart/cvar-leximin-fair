name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,example]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src
      - name: Tests
        run: pytest --cov=cvar_leximin --cov-report=xml --cov-report=term-missing
      - name: License guard (no AGPL / SSPL in core deps)
        run: |
          pip install pip-licenses
          # fail on AGPL / Affero / SSPL via pip-licenses' native classifier check.
          # (Grepping license bodies is unreliable: GPL licenses reference AGPL in
          # their compatibility clauses, which produces false positives.)
          pip-licenses --fail-on="AGPL;Affero;Affero General Public License;SSPL;Server Side Public License"
          # Save a snapshot for diff review on PRs.
          pip-licenses --format=plain --order=license > installed-licenses.txt
      - name: Upload license snapshot
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: installed-licenses
          path: installed-licenses.txt
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

  notebook-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,example]"
      - name: Execute reference notebook
        run: |
          papermill examples/adult_income.ipynb /tmp/out.ipynb --kernel python3
