name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,example]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src
      - name: Tests
        run: pytest --cov=cvar_leximin --cov-report=xml --cov-report=term-missing
      - name: License guard (no AGPL / SSPL in core deps)
        run: |
          pip install pip-licenses
          # fail the build if any installed dependency is AGPL-family
          pip-licenses --format=plain-vertical --with-license-file --no-license-path \
            | tee installed-licenses.txt
          if grep -E -i "AGPL|Affero|SSPL|Server Side Public License" installed-licenses.txt; then
            echo "::error::strong-copyleft license detected in dependency closure"
            exit 1
          fi
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  notebook-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,example]"
      - name: Execute reference notebook
        run: |
          papermill examples/adult_income.ipynb /tmp/out.ipynb --kernel python3
